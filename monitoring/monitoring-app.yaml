apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 55.5.0

    helm:
      values: |
        prometheus:
          enabled: true
          service:
            type: ClusterIP
          prometheusSpec:
            replicas: 1
            retention: 6h
            resources:
              requests:
                memory: 100Mi
                cpu: 50m

        alertmanager:
          enabled: true

        grafana:
          enabled: true

        kubeStateMetrics:
          enabled: true

        nodeExporter:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true