apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: jenish48/todo-app-frontend:1ed2cc43d4af9422c9a228b2bbafca184509a2e4
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_URL
              value: "http://a444212d28bcb4b7586a9db108e1fd0e-824428340.ap-south-1.elb.amazonaws.com"
