apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: jenish48/todo-app:e5a5da095a307ae48bd2b69d42c2951851293d77
          imagePullPolicy: Always
          ports:
            - containerPort: 80
