apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: jenish48/todo-app:f82fa96570029ade7c555045cec9b23bb6e58a9d
          imagePullPolicy: Always
          ports:
            - containerPort: 80
