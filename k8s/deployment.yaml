apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: jenish48/todo-app:a8059a42c8406e03cd62f4515f45349aa67c4b23
          imagePullPolicy: Always
          ports:
            - containerPort: 80
