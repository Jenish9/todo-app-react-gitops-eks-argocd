apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: jenish48/todo-app-backend:1ed2cc43d4af9422c9a228b2bbafca184509a2e4
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
