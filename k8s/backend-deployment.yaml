apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:40162566f7aee14160ec709721bed76d0f36b67c
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
