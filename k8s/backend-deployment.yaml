apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:da3f652791f0604ca60ab9a7d20a0730c13996df
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
