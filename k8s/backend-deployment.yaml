apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:d1a6ede5e0c79a5265ed39930cf136d82ea7c4d5
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
