apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: jenish48/todo-app-backend:6a04ede9d83824f22aa576417521c052de830e47
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
