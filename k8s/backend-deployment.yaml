apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:80a8777c51e551649b2be58ac466a1e57d7f4020
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
