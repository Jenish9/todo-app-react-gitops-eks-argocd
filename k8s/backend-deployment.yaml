apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:e55f385449a09b2693459122e46a76acd667db8b
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
