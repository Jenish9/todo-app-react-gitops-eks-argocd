apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:ecb8d2bea5331428fdbbd0449c78890aa0db4240
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
