apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:8ad2bb4750b2a00ee3d46794197d1750c15bb465
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
