apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:9eef8f56b7f2f57a18ff3c6d23e4e186f0a7a0a8
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
