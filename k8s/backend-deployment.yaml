apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: jenish48/todo-app-backend:e6126ba61e4823cca6cd7e00bb8dbaa188cc6070
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
