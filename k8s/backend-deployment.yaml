apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:8b7e9f6a7049e595f30f22be19d8e080bd01eccd
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
