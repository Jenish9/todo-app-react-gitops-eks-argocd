apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: jenish48/todo-app-backend:ff5ac9f71c071ed4f9f4b200d9c5d9952f83f33c
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
