apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:deb9ce41b13cab923f38a501c74c18f917995c2f
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
