apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:925863ee3617b654a05c9e5c3c634c4fdc4f5cb6
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
