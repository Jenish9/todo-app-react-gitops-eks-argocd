apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jenish48/todo-app-backend:ad360cfd94f78989636a84bdebe10e23bcaa348c
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
